<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FFFFFF" />
  <title>Birthday Adventure</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg); padding-bottom: 60px; }

    /* Header */
    .site-header {
      padding: 20px 24px 24px;
      background: white;
      border-bottom: 1px solid var(--border);
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .header-subtitle {
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    /* Progress */
    .progress-container {
      background: var(--bg-light);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .progress-count {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      background: var(--text);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .stamps-row {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .stamp-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-dark);
      transition: all 0.3s ease;
    }

    .stamp-dot.done {
      background: var(--text);
      transform: scale(1.3);
    }

    /* Completion Banner */
    .completion-banner {
      margin: 20px 24px 16px;
      background: var(--text);
      color: white;
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .completion-banner:hover {
      transform: translateY(-2px);
    }

    .completion-banner .banner-emoji {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .completion-banner .banner-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .completion-banner .banner-subtitle {
      font-size: 14px;
      opacity: 0.85;
    }

    /* Section Title */
    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      padding: 24px 24px 16px;
      letter-spacing: -0.3px;
    }

    /* Cards Grid */
    .cards-container {
      padding: 0 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Adventure Card - Image First Style */
    .adventure-card {
      background: white;
      border-radius: var(--radius-card);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .adventure-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .adventure-card:active {
      transform: scale(0.98);
    }

    /* Card Image */
    .card-image-wrapper {
      position: relative;
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, #E8E1F0 0%, #D4C9E3 100%);
      overflow: hidden;
    }

    .card-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      opacity: 0.6;
    }

    /* Status Badge on Image */
    .card-status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card-status-badge.completed {
      background: var(--text);
      color: white;
    }

    /* Card Content */
    .card-content {
      padding: 16px;
    }

    .card-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .card-location {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--text-light);
    }

    /* Locked Overlay */
    .card-locked-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      opacity: 0.7;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      background: white;
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .modal-emoji {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-message {
      font-size: 15px;
      color: var(--text-light);
      line-height: 1.6;
      white-space: pre-line;
      margin-bottom: 24px;
    }

    .modal-button {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-button:hover {
      background: #000000;
    }

    .modal-letter {
      text-align: left;
      background: var(--bg-light);
      padding: 24px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .letter-to {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .letter-body {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-line;
      margin-bottom: 20px;
    }

    .letter-from {
      text-align: right;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-light);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <h1 class="header-title" id="siteTitle">Birthday Adventure</h1>
    <p class="header-subtitle" id="siteSub">스탬프를 모아 특별한 하루를 완성해요</p>
    
    <div class="progress-container">
      <div class="progress-header">
        <span class="progress-label">진행 상황</span>
        <span class="progress-count" id="progressCount">0 / 6</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="stamps-row" id="stampsRow"></div>
    </div>
  </header>

  <!-- Completion Banner -->
  <div class="completion-banner hidden" id="completionBanner" onclick="showCompletionModal()">
    <div class="banner-emoji">🎉</div>
    <div class="banner-title">다했다!!!!</div>
    <div class="banner-subtitle">나 할 말 있어!!!!</div>
  </div>

  <!-- Section Title -->
  <h2 class="section-title">여정 목록</h2>

  <!-- Cards Container -->
  <div class="cards-container" id="cardsContainer"></div>

  <!-- Completion Modal -->
  <div class="modal-overlay" id="completionModal">
    <div class="modal-box">
      <div id="envelopeView">
        <div class="modal-emoji">💌</div>
        <h2 class="modal-title">다했다!!!!</h2>
        <p class="modal-message">나 할 말 있어!!!!</p>
        <button class="modal-button" onclick="openLetter()">편지 열기</button>
      </div>

      <div id="letterView" class="hidden">
        <div class="modal-letter">
          <div class="letter-to" id="letterTo">소중한 당신에게,</div>
          <div class="letter-body" id="letterBody"></div>
          <div class="letter-from" id="letterFrom"></div>
        </div>
        <button class="modal-button" onclick="closeModal()">닫기</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    checkAuth();

    // Update text from config
    document.getElementById("siteTitle").textContent = CONFIG.mainTitle || "Birthday Adventure";
    document.getElementById("siteSub").textContent = CONFIG.mainSubtitle || "스탬프를 모아 특별한 하루를 완성해요";

    if (CONFIG.letter) {
      document.getElementById("letterTo").textContent = CONFIG.letter.to || "소중한 당신에게,";
      document.getElementById("letterBody").textContent = CONFIG.letter.body || "";
      document.getElementById("letterFrom").textContent = CONFIG.letter.from || "";
    }

    let hasShownModal = false;

    function renderPage() {
      const completed = getCompletedStamps();
      const total = adventures.length;
      const count = completed.length;

      // Update progress
      document.getElementById("progressCount").textContent = `${count} / ${total}`;
      document.getElementById("progressFill").style.width = `${(count / total) * 100}%`;

      // Render stamps
      const stampsRow = document.getElementById("stampsRow");
      stampsRow.innerHTML = adventures
        .map(a => `<div class="stamp-dot ${completed.includes(a.id) ? 'done' : ''}"></div>`)
        .join("");

      // Show completion banner
      if (count === total && total > 0) {
        document.getElementById("completionBanner").classList.remove("hidden");
      }

      // Render cards
      const container = document.getElementById("cardsContainer");
      container.innerHTML = adventures
        .map((adv, idx) => {
          const done = completed.includes(adv.id);
          const prevDone = idx === 0 || completed.includes(adventures[idx - 1].id);
          const locked = CONFIG.sequential && !prevDone && !done;

          // Get image from Google Drive if available
          const hasImage = adv.location.googleDriveImages && adv.location.googleDriveImages[0];
          const imageUrl = hasImage ? getDriveImageUrl(adv.location.googleDriveImages[0]) : null;

          return `
            <div class="adventure-card" onclick="${locked ? 'showLockedMsg()' : `goToQuiz(${adv.id})`}">
              <div class="card-image-wrapper" style="background: ${adv.cardGradient};">
                ${imageUrl 
                  ? `<img src="${imageUrl}" alt="${adv.title}" loading="lazy" />`
                  : `<div class="card-image-placeholder">${adv.emoji}</div>`
                }
                <div class="card-status-badge ${done ? 'completed' : ''}">${done ? '✓ 완료' : locked ? '🔒 잠김' : '진행 가능'}</div>
              </div>
              <div class="card-content">
                <div class="card-badge">STAMP ${adv.id}</div>
                <h3 class="card-title">${adv.title}</h3>
              </div>
              ${locked ? '<div class="card-locked-overlay">🔒</div>' : ''}
            </div>
          `;
        })
        .join("");

      // Auto-show completion modal
      if (count === total && total > 0 && !hasShownModal) {
        hasShownModal = true;
        setTimeout(() => {
          showCompletionModal();
          fireBigConfetti();
        }, 800);
      }
    }

    function goToQuiz(id) {
      window.location.href = `quiz.html?id=${id}`;
    }

    function showLockedMsg() {
      alert("이전 여정을 먼저 완료해주세요!");
    }

    function showCompletionModal() {
      document.getElementById("envelopeView").classList.remove("hidden");
      document.getElementById("letterView").classList.add("hidden");
      document.getElementById("completionModal").classList.add("show");
      fireConfetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }

    function openLetter() {
      document.getElementById("envelopeView").classList.add("hidden");
      document.getElementById("letterView").classList.remove("hidden");
      fireConfetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
    }

    function closeModal() {
      document.getElementById("completionModal").classList.remove("show");
    }

    renderPage();
  </script>
</body>
</html>
